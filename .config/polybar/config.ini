[colors]
background = #1e1e2e
foreground = #cdd6f4
accent     = #89b4fa
dim        = #585b70
focused-bg = #313244

[bar/main]
monitor               = ${env:MONITOR:}
width                 = 100%
height                = 22
background            = ${colors.background}
foreground            = ${colors.foreground}
font-0                = monospace:size=12;2

modules-left          = i3
modules-center        =
modules-right         = pulseaudio ethernet network battery tray date

border-size           = 0
padding-left          = 0
padding-right         = 0
module-margin         = 1

[bar/secondary]
monitor               = ${env:MONITOR:}
width                 = 100%
height                = 22
background            = ${colors.background}
foreground            = ${colors.foreground}
font-0                = monospace:size=12;2

modules-left          = i3
modules-center        =
modules-right         = pulseaudio ethernet network battery date

border-size           = 0
padding-left          = 0
padding-right         = 0
module-margin         = 2

[module/i3]
type                  = internal/i3
pin-workspaces        = true
format                = <label-state> <label-mode>
label-focused         = %name%
label-focused-foreground = ${colors.accent}
label-focused-background = ${colors.focused-bg}
label-focused-padding = 1
label-unfocused       = %name%
label-unfocused-foreground = ${colors.dim}
label-unfocused-background = ${colors.background}
label-unfocused-padding = 1
label-visible         = %name%
label-visible-foreground = ${colors.dim}
label-visible-background = ${colors.background}
label-visible-padding = 1
label-urgent          = %name%
label-urgent-foreground = #f38ba8
label-urgent-background = ${colors.background}
label-urgent-padding  = 1

[module/date]
type                  = internal/date
interval              = 1
date                  = %a %d %b
time                  = %H:%M
format                = <label>
label                 = %date%  %time%
label-foreground      = ${colors.foreground}

[module/pulseaudio]
type                  = internal/pulseaudio
format-volume         = <label-volume>
label-volume          = VOL %percentage%%
label-muted           = MUTE
label-muted-foreground = ${colors.dim}

[module/network]
type                  = internal/network
interface             = wlp0s20f3
interval              = 3
format-connected      = <label-connected>
format-disconnected   = <label-disconnected>
label-connected       = wifi %local_ip%
label-connected-foreground = ${colors.foreground}
label-disconnected    =
label-disconnected-foreground = ${colors.dim}

[module/ethernet]
type                  = internal/network
interface             = enx00e04c6837e9
interval              = 3
format-connected      = <label-connected>
format-disconnected   = <label-disconnected>
label-connected       = eth %local_ip%
label-connected-foreground = ${colors.foreground}
label-disconnected    =
label-disconnected-foreground = ${colors.dim}

[module/battery]
type                  = internal/battery
full-at               = 99
format-charging       = CHR <label-charging>
format-discharging    = <label-discharging>
format-full           = FULL
label-charging        = %percentage%%
label-discharging     = BAT %percentage%%
label-discharging-foreground = ${colors.foreground}

[module/tray]
type                  = internal/tray
tray-size             = 20
tray-padding          = 4
